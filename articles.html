<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="format-detection" content="telephone=no" />
  <title>すべての記事 | BAIKO TIMES</title>
  <link rel="stylesheet" href="./css/style.css" />
  <script src="./js/admin-mode.js" defer></script>
  <script src="./js/hamburger-menu.js" defer></script>
  <style>
    .articles-wrap {
      width: min(1100px, 94%);
      margin: 24px auto 40px;
    }

    .articles-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .articles-head h1 {
      margin: 0;
      font-size: clamp(1.25rem, 2.2vw, 1.75rem);
      color: var(--text);
    }


    .articles-head-right {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .articles-search-form {
      display: flex;
      align-items: center;
      gap: 8px;
      width: min(360px, 100%);
    }

    .articles-search-input-wrap {
      position: relative;
      flex: 1;
      min-width: 0;
    }

    .articles-search-form input {
      width: 100%;
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 12px;
      font: inherit;
      background: #fff;
      color: var(--text);
    }

    .articles-search-hint {
      position: absolute;
      left: 13px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
      opacity: 1;
      transition: opacity 0.35s ease;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: calc(100% - 24px);
    }

    .articles-search-hint.is-hidden {
      opacity: 0;
    }

    .articles-search-form button {
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      background: var(--accent);
      color: #fff;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    .articles-sort-wrap {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      padding: 6px 10px;
    }

    .articles-sort-icon {
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1;
    }

    .articles-sort {
      border: 0;
      background: transparent;
      color: var(--text);
      font: inherit;
      padding: 0;
    }

    .articles-view-wrap {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      padding: 6px 10px;
    }

    .articles-view-icon {
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1;
    }

    .articles-view {
      border: 0;
      background: transparent;
      color: var(--text);
      font: inherit;
      padding: 0;
    }

    .articles-count {
      margin: 0;
      color: var(--muted);
      font-weight: 600;
    }

    .all-articles-list {
      margin: 0;
      padding: 0;
      list-style: none;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 18px;
    }

    .all-articles-list li {
      background: #fff;
      border-radius: 0;
      border: 1px solid var(--line);
      overflow: hidden;
      box-shadow: 0 5px 16px rgba(17, 39, 89, 0.1);
    }

    .all-articles-list .article-card-link {
      display: block;
      text-decoration: none;
      color: inherit;
    }

    .all-articles-list .article-card-thumb {
      display: block;
      overflow: hidden;
    }

    .all-articles-list .article-card-thumb img {
      width: 100%;
      object-fit: contain;
      display: block;
      transition: transform 0.3s ease;
      background: #f5f5f5;
    }

    .all-articles-list .article-card-link:hover .article-card-thumb img {
      transform: scale(1.05);
    }

    .all-articles-list .article-card-meta {
      padding: 12px 12px 14px;
      text-align: center;
    }

    .all-articles-list .issue {
      margin: 0;
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 600;
    }

    .all-articles-list .title {
      margin: 6px 0 0;
      font-weight: 700;
      color: var(--text);
      font-size: 0.98rem;
    }

    .all-articles-list .likes {
      margin: 8px 0 0;
      color: var(--accent);
      font-size: 0.9rem;
      font-weight: 700;
    }

    .all-articles-list .tags {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 0.85rem;
      font-weight: 500;
    }

    .articles-view-wrap {
      display: none;
    }

    .pager {
      margin-top: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .pager button {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      color: var(--text);
      padding: 8px 12px;
      font: inherit;
      cursor: pointer;
    }

    .pager button[disabled] {
      opacity: 0.55;
      cursor: default;
    }

    .pager .current {
      min-width: 8ch;
      text-align: center;
      color: var(--muted);
      font-weight: 600;
    }

    @media (max-width: 640px) {
      .all-articles-list {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }
    }
  </style>
</head>
<body>
  <header class="top-header">
    <div class="header-row">
      <h1 class="site-title">BAIKO TIMES<span class="site-title-sub">学生制作広報誌</span></h1>
      <div class="header-actions">
        <button id="hamburgerMenuBtn" class="hamburger-menu-btn" aria-label="メニューを開く" aria-haspopup="true" aria-expanded="false">☰</button>
      </div>
    </div>
  </header>

  <div id="hamburgerMenuOverlay" class="hamburger-menu-overlay" tabindex="-1" aria-hidden="true">
    <div class="hamburger-menu-panel">
      <button id="hamburgerMenuClose" class="hamburger-menu-close" aria-label="閉じる">×</button>
      <nav class="hamburger-menu-list" aria-label="グローバルメニュー">
        <a href="./index.html" class="hamburger-menu-card">HOME</a>
        <a href="./articles.html" class="hamburger-menu-card">BACK NUMBER</a>
        <a href="./index.html#aboutMagazineSection" class="hamburger-menu-card">ABOUT<br>MAGAZIN</a>
        <a href="https://www.instagram.com/baiko_gakuyu/" class="hamburger-menu-card instagram-link" data-instagram-handle="baiko_gakuyu" target="_blank" rel="noopener">Instagram</a>
      </nav>
    </div>
  </div>

  <main class="articles-wrap">    <section class="articles-head">
      <h1 id="articlesTitle">&#12377;&#12409;&#12390;&#12398;&#35352;&#20107;</h1>
      <div class="articles-head-right">
        <form class="articles-search-form" id="articlesSearchForm" role="search" aria-label="すべての記事内を検索">
          <div class="articles-search-input-wrap">
            <input id="articlesSearchInput" type="search" aria-label="記事検索" />
            <span class="articles-search-hint" id="articlesSearchHint" aria-hidden="true"></span>
          </div>
          <button type="submit">検索</button>
        </form>
        <button id="closeButton" type="button" style="display: none;">閉じる</button>
        <label class="articles-sort-wrap" for="sortOrder">
          <span class="articles-sort-icon" aria-hidden="true">&#8645;</span>
          <select class="articles-sort" id="sortOrder" aria-label="&#20006;&#12403;&#38918;">
            <option value="new">&#26032;&#12375;&#12356;&#38918;</option>
            <option value="old">&#21476;&#12356;&#38918;</option>
            <option value="likes">いいねが高い順</option>
          </select>
        </label>
        <label class="articles-view-wrap" for="viewMode">
          <span class="articles-view-icon" aria-hidden="true">&#9638;</span>
          <select class="articles-view" id="viewMode" aria-label="&#34920;&#31034;&#24418;&#24335;">
            <option value="list">&#12522;&#12473;&#12488;&#22411;</option>
            <option value="card">&#12459;&#12540;&#12489;&#22411;</option>
          </select>
        </label>
        <p class="articles-count" id="articlesCount">&#35501;&#12415;&#36796;&#12415;&#20013;...</p>
      </div>
    </section>

    <ul class="all-articles-list" id="allArticlesList"></ul>

    <nav class="pager" aria-label="ページ送り">
      <button id="prevPage" type="button">前へ</button>
      <span class="current" id="pageInfo">1 / 1</span>
      <button id="nextPage" type="button">次へ</button>
    </nav>
  </main>

  <script>
    const allArticlesList = document.getElementById('allArticlesList');
    const articlesCount = document.getElementById('articlesCount');
    const prevPage = document.getElementById('prevPage');
    const nextPage = document.getElementById('nextPage');
    const pageInfo = document.getElementById('pageInfo');
    const articlesSearchForm = document.getElementById('articlesSearchForm');
    const articlesSearchInput = document.getElementById('articlesSearchInput');
    const articlesSearchHint = document.getElementById('articlesSearchHint');
    const sortOrder = document.getElementById('sortOrder');
    const viewMode = document.getElementById('viewMode');
    const queryParams = new URLSearchParams(window.location.search);
    const filterTag = String(queryParams.get('tag') || '').trim().toLowerCase().replace(/^#/, '');
    const filterQuery = String(queryParams.get('q') || '').trim().toLowerCase();

    const PAGE_SIZE = 12;
    let allSpots = [];
    let currentPage = 1;
    const fallbackSearchExamples = ['学生生活', '国際交流', 'オープンキャンパス', '留学', '大学内施設', '就職・進路'];
    const SEARCH_PLACEHOLDER_INTERVAL_MS = 3000;
    let searchPlaceholderTimer = null;

    if (articlesSearchInput && filterQuery) {
      articlesSearchInput.value = filterQuery;
    }

    function pickRandomItem(items) {
      if (!Array.isArray(items) || items.length === 0) {
        return '';
      }
      const index = Math.floor(Math.random() * items.length);
      return String(items[index] || '').trim();
    }

    function getSearchExamplePool() {
      const tagPool = allSpots
        .flatMap((spot) => Array.isArray(spot && spot.tags) ? spot.tags : [])
        .map((tag) => String(tag || '').trim())
        .filter((tag, index, array) => tag && array.indexOf(tag) === index);

      return tagPool.length ? tagPool : fallbackSearchExamples;
    }

    function updateSearchPlaceholder() {
      if (!articlesSearchInput || !articlesSearchHint) {
        return;
      }

      const example = pickRandomItem(getSearchExamplePool()) || '学生生活';
      articlesSearchHint.textContent = `タグ例: ${example}`;
      articlesSearchHint.classList.toggle('is-hidden', Boolean(articlesSearchInput.value));
    }

    function fadeSearchHint() {
      if (!articlesSearchHint || !articlesSearchInput || articlesSearchInput.value) {
        return;
      }

      articlesSearchHint.classList.add('is-hidden');
      window.setTimeout(() => {
        updateSearchPlaceholder();
        articlesSearchHint.classList.remove('is-hidden');
      }, 220);
    }

    function startSearchPlaceholderRotation() {
      if (!articlesSearchInput) {
        return;
      }
      if (searchPlaceholderTimer) {
        window.clearInterval(searchPlaceholderTimer);
      }

      searchPlaceholderTimer = window.setInterval(() => {
        if (document.activeElement === articlesSearchInput) {
          return;
        }
        fadeSearchHint();
      }, SEARCH_PLACEHOLDER_INTERVAL_MS);
    }

    // 国の名前リスト（国際交流用）
    const countryNames = ['マレーシア', 'オーストラリア', 'スリランカ', 'インドネシア', 'タイ', 'ベトナム', 'フィリピン', '中国', '韓国', '台湾', 'アメリカ', 'カナダ', 'イギリス', 'ドイツ', 'フランス', 'イタリア', 'スペイン', 'オランダ', 'スウェーデン', 'ノルウェー', 'デンマーク', 'フィンランド', 'ポーランド', 'チェコ', 'ハンガリー', 'ロシア', 'ブラジル', 'アルゼンチン', 'チリ', 'メキシコ', 'ペルー', 'コロンビア', 'エクアドル', 'ボリビア', 'パラグアイ', 'ウルグアイ', '南アフリカ', 'ナイジェリア', 'ケニア', 'エジプト', 'モロッコ', 'チュニジア', 'アルジェリア', 'リビア', 'ガーナ', 'セネガル', 'コートジボワール', 'カメルーン', 'タンザニア', 'ウガンダ', 'ルワンダ', 'ブルンジ', 'ジンバブエ', 'ザンビア', 'マラウイ', 'モザンビーク', 'マダガスカル', 'モーリシャス', 'セーシェル', 'コモロ', 'ジブチ', 'ソマリア', 'エチオピア', 'スーダン', '南スーダン', 'チャド', '中央アフリカ', 'コンゴ', 'ガボン', '赤道ギニア', 'サントメ・プリンシペ', 'アンゴラ', 'ナミビア', 'ボツワナ', 'レソト', 'スワジランド', '日本', '北海道', '下関'];



    function pickLatestAddedSpot(spots) {
      if (!Array.isArray(spots) || spots.length === 0) {
        return null;
      }
      return [...spots].sort((a, b) => {
        const aTime = Date.parse(String(a && a.createdAt ? a.createdAt : ''));
        const bTime = Date.parse(String(b && b.createdAt ? b.createdAt : ''));
        const safeA = Number.isNaN(aTime) ? 0 : aTime;
        const safeB = Number.isNaN(bTime) ? 0 : bTime;
        if (safeA !== safeB) {
          return safeB - safeA;
        }
        const aIssue = (Number(a && a.issueYear) || 0) * 100 + (Number(a && a.issueMonth) || 0);
        const bIssue = (Number(b && b.issueYear) || 0) * 100 + (Number(b && b.issueMonth) || 0);
        return bIssue - aIssue;
      })[0];
    }

    function escapeHtml(value) {
      return String(value || '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function getPageCount() {
      return Math.max(1, Math.ceil(getVisibleSpots().length / PAGE_SIZE));
    }


    function toSortKey(spot) {
      const issueYear = Number(spot && spot.issueYear);
      const issueMonth = Number(spot && spot.issueMonth);
      const y = Number.isInteger(issueYear) ? issueYear : 0;
      const m = Number.isInteger(issueMonth) ? issueMonth : 0;
      return y * 100 + m;
    }

    function sortSpotsInPlace() {
      const mode = sortOrder ? sortOrder.value : 'new';
      allSpots.sort((a, b) => {
        if (mode === 'likes') {
          const likesA = Math.max(0, Number(a && a.likes) || 0);
          const likesB = Math.max(0, Number(b && b.likes) || 0);
          if (likesA !== likesB) {
            return likesB - likesA;
          }
        }

        const issueDiff = toSortKey(a) - toSortKey(b);
        if (issueDiff !== 0) {
          return mode === 'old' ? issueDiff : -issueDiff;
        }

        const aDate = Date.parse(String(a && a.createdAt ? a.createdAt : ''));
        const bDate = Date.parse(String(b && b.createdAt ? b.createdAt : ''));
        const safeA = Number.isNaN(aDate) ? 0 : aDate;
        const safeB = Number.isNaN(bDate) ? 0 : bDate;
        if (safeA !== safeB) {
          return mode === 'old' ? safeA - safeB : safeB - safeA;
        }

        return 0;
      });
    }

    function applyViewMode() {
      allArticlesList.classList.add('is-card');
    }

    function getVisibleSpots() {
      let visible = allSpots;
      if (filterTag) {
        if (filterTag === '国際交流') {
          visible = allSpots.filter((spot) => {
            const tags = Array.isArray(spot && spot.tags) ? spot.tags : [];
            return tags.some((tag) => {
              const tagStr = String(tag || '').trim().toLowerCase();
              return countryNames.some((country) => tagStr.includes(country.toLowerCase()));
            });
          });
        } else if (filterTag === '就職・進路') {
          const jobTags = ['実習', 'インターンシップ', 'サービスラーニング'];
          visible = allSpots.filter((spot) => {
            const tags = Array.isArray(spot && spot.tags) ? spot.tags : [];
            return tags.some((tag) => {
              const tagStr = String(tag || '').trim().toLowerCase();
              return jobTags.some((jobTag) => tagStr.includes(jobTag.toLowerCase()));
            });
          });
        } else if (filterTag === '学生生活') {
          const lifeTags = ['振り返り', '大学内施設', '学生生活'];
          visible = allSpots.filter((spot) => {
            const tags = Array.isArray(spot && spot.tags) ? spot.tags : [];
            return tags.some((tag) => {
              const tagStr = String(tag || '').trim().toLowerCase();
              return lifeTags.some((lifeTag) => tagStr.includes(lifeTag.toLowerCase()));
            });
          });
        } else {
          visible = allSpots.filter((spot) => {
            const tags = Array.isArray(spot && spot.tags) ? spot.tags : [];
            return tags.some((tag) => String(tag || '').trim().toLowerCase().replace(/^#/, '').includes(filterTag));
          });
        }
      }

      const query = String(articlesSearchInput && articlesSearchInput.value ? articlesSearchInput.value : '').trim().toLowerCase();
      if (!query) {
        return visible;
      }

      return visible.filter((spot) => {
        const title = String(spot && spot.title ? spot.title : '').toLowerCase();
        const summary = String(spot && spot.summary ? spot.summary : '').toLowerCase();
        const tags = Array.isArray(spot && spot.tags) ? spot.tags.join(' ').toLowerCase() : '';
        const issue = `${spot && spot.issueYear ? spot.issueYear : ''}年${spot && spot.issueMonth ? spot.issueMonth : ''}月号`.toLowerCase();
        return title.includes(query) || summary.includes(query) || tags.includes(query) || issue.includes(query);
      });
    }

    function renderPage() {
      applyViewMode();
      const visibleSpots = getVisibleSpots();
      const pageCount = getPageCount();
      currentPage = Math.min(Math.max(1, currentPage), pageCount);
      const start = (currentPage - 1) * PAGE_SIZE;
      const pageItems = visibleSpots.slice(start, start + PAGE_SIZE);

      if (!pageItems.length) {
        allArticlesList.innerHTML = '<li>記事がありません。</li>';
      } else {
        allArticlesList.innerHTML = pageItems.map((spot) => {
          const filePath = String(spot.filePath || '').trim();
          const legacyUrl = String(spot.url || '').trim();
          const linkPath = filePath || legacyUrl;
          const viewerPath = linkPath
            ? `/article/article-viewer.html?src=${encodeURIComponent(linkPath)}`
            : '';
          const title = escapeHtml(spot.title || '');
          const issue = Number.isInteger(Number(spot.issueYear)) && Number.isInteger(Number(spot.issueMonth))
            ? `${spot.issueYear}年${spot.issueMonth}月号`
            : '掲載号未設定';
          const likes = Math.max(0, Number(spot.likes) || 0);
          const imagePath = String(
            spot.coverImagePath || spot.coverPath || spot.thumbnailPath || spot.imagePath || '/uploads/1772641750165-1.svg'
          ).trim();
          const href = viewerPath || '#';
          return `<li><a class="article-card-link" href="${escapeHtml(href)}"><span class="article-card-thumb"><img src="${escapeHtml(imagePath)}" alt="${title}"></span><span class="article-card-meta"><p class="issue">${issue}</p><p class="title">${title}</p><p class="likes">♥ ${likes}</p></span></a></li>`;
        }).join('');
      }

      pageInfo.textContent = `${currentPage} / ${pageCount}`;
      prevPage.disabled = currentPage <= 1;
      nextPage.disabled = currentPage >= pageCount;
      articlesCount.textContent = `${visibleSpots.length} / ${allSpots.length}`;
    }

    prevPage.addEventListener('click', () => {
      if (currentPage > 1) {
        currentPage -= 1;
        renderPage();
      }
    });

    nextPage.addEventListener('click', () => {
      if (currentPage < getPageCount()) {
        currentPage += 1;
        renderPage();
      }
    });


    if (sortOrder) {
      sortOrder.addEventListener('change', () => {
        sortSpotsInPlace();
        currentPage = 1;
        renderPage();
      });
    }

    if (viewMode) {
      viewMode.addEventListener('change', () => {
        renderPage();
      });
    }

    if (articlesSearchForm && articlesSearchInput) {
      articlesSearchForm.addEventListener('submit', (event) => {
        event.preventDefault();
        currentPage = 1;
        renderPage();
      });
      articlesSearchInput.addEventListener('input', () => {
        if (articlesSearchHint) {
          articlesSearchHint.classList.toggle('is-hidden', Boolean(articlesSearchInput.value));
        }
        currentPage = 1;
        renderPage();
      });
      articlesSearchInput.addEventListener('focus', () => {
        if (articlesSearchHint) {
          articlesSearchHint.classList.add('is-hidden');
        }
      });
      articlesSearchInput.addEventListener('blur', () => {
        updateSearchPlaceholder();
      });
    }

    async function loadAllSpots() {
      try {
        const response = await fetch('/api/spots');
        const raw = await response.text();
        let parsed = {};
        try {
          parsed = raw ? JSON.parse(raw) : {};
        } catch {
          parsed = {};
        }
        if (!response.ok) {
          const fallback = raw ? `記事一覧の取得に失敗しました (${response.status})` : '記事一覧の取得に失敗しました。';
          throw new Error(parsed.error || fallback);
        }
        allSpots = Array.isArray(parsed.spots) ? parsed.spots : [];
        updateSearchPlaceholder();
        sortSpotsInPlace();
        currentPage = 1;
        renderPage();
      } catch (error) {
        updateSearchPlaceholder();
        articlesCount.textContent = error.message || '記事一覧の読み込みに失敗しました。';
        allArticlesList.innerHTML = '<li>記事一覧の読み込みに失敗しました。</li>';
        prevPage.disabled = true;
        nextPage.disabled = true;
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      updateSearchPlaceholder();
      startSearchPlaceholderRotation();
      loadAllSpots();

      // タイトルと閉じるボタンの設定
      const articlesTitle = document.getElementById('articlesTitle');
      const closeButton = document.getElementById('closeButton');
      if (filterTag) {
        // タグが指定されている場合、タイトルを変更し、閉じるボタンを表示
        articlesTitle.textContent = '学部・学科案内';
        closeButton.style.display = 'inline-block';
        closeButton.addEventListener('click', () => {
          window.location.href = './index.html';
        });
      }
    });
  </script>
</body>
</html>
