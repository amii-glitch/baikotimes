<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="format-detection" content="telephone=no" />
  <title>すべての記事 | BAIKO TIMES</title>
  <link rel="stylesheet" href="./css/style.css" />
  <script src="./js/admin-mode.js" defer></script>
  <style>
    .articles-wrap {
      width: min(1100px, 94%);
      margin: 24px auto 40px;
    }

    .articles-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .articles-head h1 {
      margin: 0;
      font-size: clamp(1.25rem, 2.2vw, 1.75rem);
      color: var(--text);
    }


    .articles-head-right {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .articles-sort-wrap {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      padding: 6px 10px;
    }

    .articles-sort-icon {
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1;
    }

    .articles-sort {
      border: 0;
      background: transparent;
      color: var(--text);
      font: inherit;
      padding: 0;
    }

    .articles-view-wrap {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      padding: 6px 10px;
    }

    .articles-view-icon {
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1;
    }

    .articles-view {
      border: 0;
      background: transparent;
      color: var(--text);
      font: inherit;
      padding: 0;
    }

    .articles-count {
      margin: 0;
      color: var(--muted);
      font-weight: 600;
    }

    .all-articles-list {
      margin: 0;
      padding: 0;
      list-style: none;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 18px;
    }

    .all-articles-list li {
      background: #fff;
      border-radius: 12px;
      border: 1px solid var(--line);
      overflow: hidden;
      box-shadow: 0 5px 16px rgba(17, 39, 89, 0.1);
    }

    .all-articles-list .article-card-link {
      display: block;
      text-decoration: none;
      color: inherit;
    }

    .all-articles-list .article-card-thumb {
      display: block;
      overflow: hidden;
    }

    .all-articles-list .article-card-thumb img {
      width: 100%;
      aspect-ratio: 4 / 5;
      object-fit: cover;
      display: block;
      transition: transform 0.3s ease;
    }

    .all-articles-list .article-card-link:hover .article-card-thumb img {
      transform: scale(1.05);
    }

    .all-articles-list .article-card-meta {
      padding: 12px 12px 14px;
      text-align: center;
    }

    .all-articles-list .issue {
      margin: 0;
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 600;
    }

    .all-articles-list .title {
      margin: 6px 0 0;
      font-weight: 700;
      color: var(--text);
      font-size: 0.98rem;
    }

    .articles-view-wrap {
      display: none;
    }

    .pager {
      margin-top: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .pager button {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      color: var(--text);
      padding: 8px 12px;
      font: inherit;
      cursor: pointer;
    }

    .pager button[disabled] {
      opacity: 0.55;
      cursor: default;
    }

    .pager .current {
      min-width: 8ch;
      text-align: center;
      color: var(--muted);
      font-weight: 600;
    }

    @media (max-width: 640px) {
      .all-articles-list {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }
    }
  </style>
</head>
<body>
  <header class="top-header">
    <div class="header-row">
      <h1 class="site-title">BAIKO TIMES<span class="site-title-sub">学生制作広報誌</span></h1>
      <div class="header-actions">
        <button class="menu-toggle" id="menuToggle" aria-label="メニューを開く" aria-expanded="false" aria-controls="siteMenu">
          <span></span>
          <span></span>
          <span></span>
        </button>
      </div>
    </div>
  </header>

  <nav class="site-menu" id="siteMenu" aria-hidden="true">
    <h2>メニュー</h2>
    <ul>
      <li><a href="./index.html">トップ画面</a></li>
      <li><a href="./articles.html">すべての記事</a></li>
      <li><a id="menuLatestLink" href="#">最新号</a></li>
      <li><a href="./index.html#aboutMagazineSection">ＡＢＯＵＴ　ＭＡＧＡＺＩＮ</a></li>
      <li><a href="./index.html#questionSection">お問い合わせ</a></li>
    </ul>
  </nav>

  <main class="articles-wrap">    <section class="articles-head">
      <h1>&#12377;&#12409;&#12390;&#12398;&#35352;&#20107;</h1>
      <div class="articles-head-right">
        <label class="articles-sort-wrap" for="sortOrder">
          <span class="articles-sort-icon" aria-hidden="true">&#8645;</span>
          <select class="articles-sort" id="sortOrder" aria-label="&#20006;&#12403;&#38918;">
            <option value="new">&#26032;&#12375;&#12356;&#38918;</option>
            <option value="old">&#21476;&#12356;&#38918;</option>
          </select>
        </label>
        <label class="articles-view-wrap" for="viewMode">
          <span class="articles-view-icon" aria-hidden="true">&#9638;</span>
          <select class="articles-view" id="viewMode" aria-label="&#34920;&#31034;&#24418;&#24335;">
            <option value="list">&#12522;&#12473;&#12488;&#22411;</option>
            <option value="card">&#12459;&#12540;&#12489;&#22411;</option>
          </select>
        </label>
        <p class="articles-count" id="articlesCount">&#35501;&#12415;&#36796;&#12415;&#20013;...</p>
      </div>
    </section>

    <ul class="all-articles-list" id="allArticlesList"></ul>

    <nav class="pager" aria-label="ページ送り">
      <button id="prevPage" type="button">前へ</button>
      <span class="current" id="pageInfo">1 / 1</span>
      <button id="nextPage" type="button">次へ</button>
    </nav>
  </main>

  <script>
    const menuToggle = document.getElementById('menuToggle');
    const siteMenu = document.getElementById('siteMenu');
    const menuLatestLink = document.getElementById('menuLatestLink');
    const allArticlesList = document.getElementById('allArticlesList');
    const articlesCount = document.getElementById('articlesCount');
    const prevPage = document.getElementById('prevPage');
    const nextPage = document.getElementById('nextPage');
    const pageInfo = document.getElementById('pageInfo');
    const sortOrder = document.getElementById('sortOrder');
    const viewMode = document.getElementById('viewMode');
    const queryParams = new URLSearchParams(window.location.search);
    const filterTag = String(queryParams.get('tag') || '').trim().toLowerCase().replace(/^#/, '');

    const PAGE_SIZE = 12;
    let allSpots = [];
    let currentPage = 1;

    menuToggle.addEventListener('click', () => {
      const isOpen = siteMenu.classList.toggle('is-open');
      menuToggle.setAttribute('aria-expanded', String(isOpen));
      siteMenu.setAttribute('aria-hidden', String(!isOpen));
    });


    function pickLatestAddedSpot(spots) {
      if (!Array.isArray(spots) || spots.length === 0) {
        return null;
      }
      return [...spots].sort((a, b) => {
        const aTime = Date.parse(String(a && a.createdAt ? a.createdAt : ''));
        const bTime = Date.parse(String(b && b.createdAt ? b.createdAt : ''));
        const safeA = Number.isNaN(aTime) ? 0 : aTime;
        const safeB = Number.isNaN(bTime) ? 0 : bTime;
        if (safeA !== safeB) {
          return safeB - safeA;
        }
        const aIssue = (Number(a && a.issueYear) || 0) * 100 + (Number(a && a.issueMonth) || 0);
        const bIssue = (Number(b && b.issueYear) || 0) * 100 + (Number(b && b.issueMonth) || 0);
        return bIssue - aIssue;
      })[0];
    }

    function updateMenuLatestLink(spots) {
      const latest = pickLatestAddedSpot(spots);
      if (!latest) {
        menuLatestLink.setAttribute('href', '#');
        return;
      }
      const filePath = String(latest.filePath || '').trim();
      const legacyUrl = String(latest.url || '').trim();
      const linkPath = filePath || legacyUrl;
      const viewerPath = linkPath
        ? `/article/article-viewer.html?src=${encodeURIComponent(linkPath)}`
        : '#';
      menuLatestLink.setAttribute('href', viewerPath);
    }
    function escapeHtml(value) {
      return String(value || '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function getPageCount() {
      return Math.max(1, Math.ceil(getVisibleSpots().length / PAGE_SIZE));
    }


    function toSortKey(spot) {
      const issueYear = Number(spot && spot.issueYear);
      const issueMonth = Number(spot && spot.issueMonth);
      const y = Number.isInteger(issueYear) ? issueYear : 0;
      const m = Number.isInteger(issueMonth) ? issueMonth : 0;
      return y * 100 + m;
    }

    function sortSpotsInPlace() {
      const mode = sortOrder && sortOrder.value === 'old' ? 'old' : 'new';
      allSpots.sort((a, b) => {
        const issueDiff = toSortKey(a) - toSortKey(b);
        if (issueDiff !== 0) {
          return mode === 'old' ? issueDiff : -issueDiff;
        }

        const aDate = Date.parse(String(a && a.createdAt ? a.createdAt : ''));
        const bDate = Date.parse(String(b && b.createdAt ? b.createdAt : ''));
        const safeA = Number.isNaN(aDate) ? 0 : aDate;
        const safeB = Number.isNaN(bDate) ? 0 : bDate;
        if (safeA !== safeB) {
          return mode === 'old' ? safeA - safeB : safeB - safeA;
        }

        return 0;
      });
    }

    function applyViewMode() {
      allArticlesList.classList.add('is-card');
    }

    function getVisibleSpots() {
      if (!filterTag) {
        return allSpots;
      }
      return allSpots.filter((spot) => {
        const tags = Array.isArray(spot && spot.tags) ? spot.tags : [];
        return tags.some((tag) => String(tag || '').trim().toLowerCase().replace(/^#/, '').includes(filterTag));
      });
    }

    function renderPage() {
      applyViewMode();
      const visibleSpots = getVisibleSpots();
      const pageCount = getPageCount();
      currentPage = Math.min(Math.max(1, currentPage), pageCount);
      const start = (currentPage - 1) * PAGE_SIZE;
      const pageItems = visibleSpots.slice(start, start + PAGE_SIZE);

      if (!pageItems.length) {
        allArticlesList.innerHTML = '<li>記事がありません。</li>';
      } else {
        allArticlesList.innerHTML = pageItems.map((spot) => {
          const filePath = String(spot.filePath || '').trim();
          const legacyUrl = String(spot.url || '').trim();
          const linkPath = filePath || legacyUrl;
          const viewerPath = linkPath
            ? `/article/article-viewer.html?src=${encodeURIComponent(linkPath)}`
            : '';
          const title = escapeHtml(spot.title || '');
          const issue = Number.isInteger(Number(spot.issueYear)) && Number.isInteger(Number(spot.issueMonth))
            ? `${spot.issueYear}年${spot.issueMonth}月号`
            : '掲載号未設定';
          const imagePath = String(
            spot.coverImagePath || spot.coverPath || spot.thumbnailPath || spot.imagePath || '/uploads/1772641750165-1.svg'
          ).trim();
          const href = viewerPath || '#';
          return `<li><a class="article-card-link" href="${escapeHtml(href)}"><span class="article-card-thumb"><img src="${escapeHtml(imagePath)}" alt="${title}"></span><span class="article-card-meta"><p class="issue">${issue}</p><p class="title">${title}</p></span></a></li>`;
        }).join('');
      }

      pageInfo.textContent = `${currentPage} / ${pageCount}`;
      prevPage.disabled = currentPage <= 1;
      nextPage.disabled = currentPage >= pageCount;
      articlesCount.textContent = `${visibleSpots.length} / ${allSpots.length}`;
    }

    prevPage.addEventListener('click', () => {
      if (currentPage > 1) {
        currentPage -= 1;
        renderPage();
      }
    });

    nextPage.addEventListener('click', () => {
      if (currentPage < getPageCount()) {
        currentPage += 1;
        renderPage();
      }
    });


    if (sortOrder) {
      sortOrder.addEventListener('change', () => {
        sortSpotsInPlace();
        currentPage = 1;
        renderPage();
      });
    }

    if (viewMode) {
      viewMode.addEventListener('change', () => {
        renderPage();
      });
    }
    async function loadAllSpots() {
      try {
        const response = await fetch('/api/spots');
        const raw = await response.text();
        let parsed = {};
        try {
          parsed = raw ? JSON.parse(raw) : {};
        } catch {
          parsed = {};
        }
        if (!response.ok) {
          const fallback = raw ? `記事一覧の取得に失敗しました (${response.status})` : '記事一覧の取得に失敗しました。';
          throw new Error(parsed.error || fallback);
        }
        allSpots = Array.isArray(parsed.spots) ? parsed.spots : [];
        sortSpotsInPlace();
        updateMenuLatestLink(allSpots);
        currentPage = 1;
        renderPage();
      } catch (error) {
        menuLatestLink.setAttribute('href', '#');
        articlesCount.textContent = error.message || '記事一覧の読み込みに失敗しました。';
        allArticlesList.innerHTML = '<li>記事一覧の読み込みに失敗しました。</li>';
        prevPage.disabled = true;
        nextPage.disabled = true;
      }
    }

    loadAllSpots();
  </script>
</body>
</html>
