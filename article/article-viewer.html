<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>記事ビューア | BAIKO TIMES</title>
  <link rel="stylesheet" href="../css/style.css" />
  <script src="../js/hamburger-menu.js" defer></script>
  <style>
    :root {
      --line: #d9e2f0;
      --surface: #ffffff;
      --text: #1f2d3d;
      --accent: #0f6fff;
      --bg: #f5f7ff;
    }

    body.season-spring {
      --line: #f3cfe0;
      --surface: #ffffff;
      --text: #4a2a39;
      --accent: #ef6aa8;
      --bg: #fff7fb;
    }

    body.season-summer {
      --line: #cfe9f3;
      --surface: #ffffff;
      --text: #1d3a4a;
      --accent: #2aa9d6;
      --bg: #f4fbff;
    }

    body.season-autumn {
      --line: #ecd8bf;
      --surface: #ffffff;
      --text: #4a321d;
      --accent: #c97a2b;
      --bg: #fffaf3;
    }

    body.season-winter {
      --line: #d4e4f0;
      --surface: #ffffff;
      --text: #263848;
      --accent: #4d9cc7;
      --bg: #f5f9fc;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", "Yu Gothic UI", sans-serif;
      color: var(--text);
      background: var(--bg);
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--line);
      background: var(--surface);
      font-family: "Yu Gothic UI", "Hiragino Sans", sans-serif;
    }

    .back-btn {
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      background: var(--accent);
      color: #fff;
      font-weight: 700;
      cursor: pointer;
      font-family: "Yu Gothic UI", "Hiragino Sans", sans-serif;
    }

    .title {
      margin: 0;
      font-size: 1rem;
      font-weight: 700;
      font-family: "Yu Gothic UI", "Hiragino Sans", sans-serif;
    }

    .frame-wrap {
      width: min(1200px, 96%);
      margin: 12px auto;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 12px;
      overflow: hidden;
      min-height: calc(100vh - 92px);
    }

    .like-bar {
      width: min(1200px, 96%);
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      padding: 8px 0 0;
    }

    .like-btn {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--surface);
      color: var(--text);
      font: inherit;
      font-weight: 700;
      padding: 8px 14px;
      cursor: pointer;
    }

    .like-count {
      color: var(--accent);
      font-weight: 700;
      min-width: 4ch;
      text-align: right;
    }

    .article-view {
      width: 100%;
      min-height: calc(100vh - 92px);
      border: 0;
      display: block;
      background: #fff;
    }

    .pdf-status {
      margin: 0;
      padding: 14px 16px;
      color: #4f5f73;
      border-bottom: 1px solid var(--line);
      font-weight: 600;
      background: #f8fbff;
    }

    .pdf-pages {
      padding: 12px;
      display: grid;
      gap: 12px;
      justify-items: center;
      background: #f2f5fb;
    }

    .pdf-page {
      display: block;
      width: min(100%, 980px);
      height: auto;
      background: #fff;
      border: 1px solid #d6e0ef;
      border-radius: 10px;
      box-shadow: 0 3px 14px rgba(18, 38, 72, 0.08);
    }
  </style>
</head>
<body>
  <header class="topbar">
    <button class="back-btn" id="backButton" type="button">メイン画面へ戻る</button>
    <p class="title">記事ビューア</p>
    <button id="hamburgerMenuBtn" class="hamburger-menu-btn" aria-label="メニューを開く" aria-haspopup="true" aria-expanded="false">☰</button>
  </header>
  <div id="hamburgerMenuOverlay" class="hamburger-menu-overlay" tabindex="-1" aria-hidden="true">
    <div class="hamburger-menu-panel">
      <button id="hamburgerMenuClose" class="hamburger-menu-close" aria-label="閉じる">×</button>
      <nav class="hamburger-menu-list" aria-label="グローバルメニュー">
        <a href="../index.html" class="hamburger-menu-card">HOME</a>
        <a href="../articles.html" class="hamburger-menu-card">BACK NUMBER</a>
        <a href="../index.html#aboutMagazineSection" class="hamburger-menu-card">ABOUT<br>MAGAZIN</a>
        <a href="https://www.instagram.com/baiko_gakuyu/" class="hamburger-menu-card instagram-link" data-instagram-handle="baiko_gakuyu" target="_blank" rel="noopener">Instagram</a>
      </nav>
    </div>
  </div>
  <div class="like-bar" aria-label="いいね操作">
    <button id="likeButton" class="like-btn" type="button">♥ いいね</button>
    <span id="likeCount" class="like-count">0</span>
  </div>
  <main class="frame-wrap">
    <div id="articleHost"></div>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
    const backButton = document.getElementById('backButton');
    backButton.textContent = '\u300c記事一覧\u300dに戻る';
    const articleHost = document.getElementById('articleHost');
    const likeButton = document.getElementById('likeButton');
    const likeCount = document.getElementById('likeCount');
    const params = new URLSearchParams(window.location.search);
    const src = params.get('src') || '';
    let currentSpotId = '';
    let isLiking = false;
    let likeApiEnabled = false;

    function applySeasonTheme() {
      const month = new Date().getMonth() + 1;
      let season = 'spring';
      if (month >= 6 && month <= 8) {
        season = 'summer';
      } else if (month >= 9 && month <= 11) {
        season = 'autumn';
      } else if (month === 12 || month <= 2) {
        season = 'winter';
      }

      document.body.classList.remove('season-spring', 'season-summer', 'season-autumn', 'season-winter');
      document.body.classList.add(`season-${season}`);
    }

    applySeasonTheme();

    function normalizePath(input) {
      const value = String(input || '').trim();
      if (!value) {
        return '';
      }
      try {
        return decodeURIComponent(value);
      } catch {
        return value;
      }
    }

    function toCanonicalSpotPath(input) {
      let value = normalizePath(input);
      if (!value) {
        return '';
      }
      if (value.startsWith('/')) {
        return value;
      }
      if (value.startsWith('../')) {
        while (value.startsWith('../')) {
          value = value.slice(3);
        }
      }
      if (value.startsWith('./')) {
        value = value.slice(2);
      }
      return `/${value}`;
    }

    function toViewerAssetPath(input) {
      const value = normalizePath(input);
      if (!value) {
        return '';
      }

      if (value.startsWith('/uploads/')) {
        return `..${value}`;
      }
      if (value.startsWith('/article/')) {
        return `.${value}`;
      }
      if (value.startsWith('./uploads/')) {
        return `../${value.slice(2)}`;
      }
      if (value.startsWith('../uploads/')) {
        return value;
      }
      if (value.startsWith('./article/')) {
        return `./${value.slice('./article/'.length)}`;
      }
      if (value.startsWith('./')) {
        return value;
      }
      if (value.startsWith('../')) {
        return value;
      }
      if (value.startsWith('uploads/')) {
        return `../${value}`;
      }
      if (value.startsWith('article/')) {
        return `./${value.slice('article/'.length)}`;
      }
      return '';
    }

    async function fetchSpots() {
      async function parseSpotsResponse(response) {
        const raw = await response.text();
        let parsed = null;
        try {
          parsed = raw ? JSON.parse(raw) : null;
        } catch {
          parsed = null;
        }
        if (Array.isArray(parsed)) {
          return parsed;
        }
        if (parsed && Array.isArray(parsed.spots)) {
          return parsed.spots;
        }
        return [];
      }

      try {
        const response = await fetch('/api/spots', { cache: 'no-store' });
        if (response.ok) {
          likeApiEnabled = true;
          return parseSpotsResponse(response);
        }
      } catch {
        // APIが使えない公開環境では静的JSONにフォールバックする。
      }

      likeApiEnabled = false;
      const staticResponse = await fetch('../spots.json', { cache: 'no-store' });
      if (!staticResponse.ok) {
        throw new Error(`記事一覧の取得に失敗しました (${staticResponse.status})`);
      }
      return parseSpotsResponse(staticResponse);
    }

    async function syncLikeState() {
      const targetPath = toCanonicalSpotPath(src);
      if (!targetPath) {
        likeButton.disabled = true;
        likeButton.textContent = 'いいね不可';
        likeCount.textContent = '-';
        return;
      }

      try {
        const spots = await fetchSpots();
        const spot = spots.find((item) => {
          const filePath = toCanonicalSpotPath(item && item.filePath ? item.filePath : '');
          const legacyUrl = toCanonicalSpotPath(item && item.url ? item.url : '');
          return filePath === targetPath || legacyUrl === targetPath;
        });

        if (!spot) {
          likeButton.disabled = true;
          likeButton.textContent = 'いいね不可';
          likeCount.textContent = '-';
          return;
        }

        currentSpotId = String(spot.id || '');
        likeButton.disabled = !likeApiEnabled || !currentSpotId;
        likeButton.textContent = likeApiEnabled ? '♥ いいね' : '♥ いいね（公開版では無効）';
        likeCount.textContent = String(Math.max(0, Number(spot.likes) || 0));
      } catch {
        likeButton.disabled = true;
        likeButton.textContent = '通信エラー';
        likeCount.textContent = '-';
      }
    }

    likeButton.addEventListener('click', async () => {
      if (!likeApiEnabled || !currentSpotId || isLiking) {
        return;
      }

      isLiking = true;
      likeButton.disabled = true;
      try {
        const response = await fetch(`/api/spots/${encodeURIComponent(currentSpotId)}/like`, {
          method: 'POST'
        });
        const data = await response.json().catch(() => ({}));
        if (!response.ok) {
          throw new Error(data.error || 'いいねの保存に失敗しました。');
        }
        likeCount.textContent = String(Math.max(0, Number(data.likes) || 0));
      } catch {
        // Keep current count on error.
      } finally {
        isLiking = false;
        likeButton.disabled = !currentSpotId;
      }
    });

    syncLikeState();

    async function renderPdfInline(pdfPath) {
      const pdfjsLib = window.pdfjsLib;
      if (!pdfjsLib) {
        articleHost.innerHTML = `<p style="padding:16px;font-family:sans-serif;">PDF表示エンジンの読み込みに失敗しました。<a href="${pdfPath}" target="_blank" rel="noopener noreferrer">こちら</a>から開いてください。</p>`;
        return;
      }

      pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
      articleHost.innerHTML = '<p class="pdf-status" id="pdfStatus">PDFを読み込み中...</p><div class="pdf-pages" id="pdfPages"></div>';

      const statusEl = document.getElementById('pdfStatus');
      const pagesEl = document.getElementById('pdfPages');

      try {
        const loadingTask = pdfjsLib.getDocument({ url: pdfPath });
        const pdf = await loadingTask.promise;
        statusEl.textContent = `全${pdf.numPages}ページ`;

        for (let pageNum = 1; pageNum <= pdf.numPages; pageNum += 1) {
          // eslint-disable-next-line no-await-in-loop
          const page = await pdf.getPage(pageNum);
          const baseViewport = page.getViewport({ scale: 1 });
          const targetWidth = Math.max(320, Math.min(980, pagesEl.clientWidth - 24));
          const scale = targetWidth / baseViewport.width;
          const viewport = page.getViewport({ scale });

          const canvas = document.createElement('canvas');
          const context = canvas.getContext('2d', { alpha: false });
          canvas.className = 'pdf-page';
          canvas.width = Math.floor(viewport.width);
          canvas.height = Math.floor(viewport.height);
          canvas.setAttribute('aria-label', `${pageNum}ページ目`);
          pagesEl.appendChild(canvas);

          // eslint-disable-next-line no-await-in-loop
          await page.render({
            canvasContext: context,
            viewport
          }).promise;
        }
      } catch (error) {
        statusEl.textContent = 'PDFの表示に失敗しました。';
        pagesEl.innerHTML = `<p style="margin:0;color:#4f5f73;">ブラウザで開く: <a href="${pdfPath}" target="_blank" rel="noopener noreferrer">PDFを開く</a></p>`;
      }
    }

    const resolvedSrc = toViewerAssetPath(src);
    if (!resolvedSrc) {
      articleHost.innerHTML = '<p style="padding:16px;font-family:sans-serif;">表示できる記事リンクではありません。</p>';
    } else {
      const safeSrc = encodeURI(resolvedSrc);
      const isPdf = /\.pdf($|\?)/i.test(safeSrc);
      if (isPdf) {
        renderPdfInline(safeSrc);
      } else {
        articleHost.innerHTML = `<iframe class="article-view" title="記事" src="${safeSrc}"></iframe>`;
      }
    }

    backButton.addEventListener('click', () => {
      window.location.href = '../articles.html';
    });
  </script>
</body>
</html>
